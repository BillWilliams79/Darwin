        <polygon points="0 0, 8 4, 0 8" fill="#5fa3d4"/>
      </marker>
      <!-- Larger arrowhead for the NVLink C2C bus connector arrows.
           markerUnits="userSpaceOnUse" keeps the arrow at a fixed 14x14 user units
           regardless of line stroke-width — otherwise it scales up and overlaps the text. -->

           the bottom-right edge just BELOW the dashed compute-tray box. Hopper restores
           the original (y=120) position via setOption since its sled enclosure differs. -->
      <g id="top-callout-body">
        <rect x="90" y="130" width="185" height="100" fill="url(#panel-callout)" stroke="#5fa3d4" stroke-width="1.2" rx="4"/>
        <text id="top-gen"    x="182" y="154" text-anchor="middle" font-size="15" font-weight="700" fill="#ffffff">NVLink 6</text>
        <line x1="105" y1="164" x2="260" y2="164" stroke="#4a8fc7" stroke-width="0.8" opacity="0.6"/>

    // Category tab switching. Buttons in the inactive panel are hidden via CSS;
    // clicking a tab simply reveals the corresponding panel. The currently-selected
    // diagram button (.selected) keeps its highlight regardless of which tab is shown.
    function setCategory(catId) {
      document.querySelectorAll('.cat-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.cat === catId);
      });
      document.querySelectorAll('.category-panel').forEach(p => {
        p.classList.toggle('hidden', p.dataset.cat !== catId);
      });
    }
