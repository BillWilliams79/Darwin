<title>Rubin / Rubin Ultra NVL Scale Up Network</title>
<style>
  body { font-family: Arial, sans-serif; margin: 0; padding: 24px; background: #fff; color: #222; }
  .container { max-width: 1300px; margin: 0 auto; }
  .controls {
    display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: flex-start;
    margin-top: 16px; padding: 18px; border-top: 1px solid #eee;
  }
  .ctrl-col { display: flex; flex-direction: column; gap: 8px; }
  .controls .label { font-weight: bold; color: #444; margin-right: 6px; }
  button {
    padding: 8px 18px; font-size: 14px; cursor: pointer; line-height: 1.2;
    border: 2px solid #1f8ed6; background: #ffffff; color: #1f8ed6;
    border-radius: 4px; font-weight: 600; transition: background 0.15s, color 0.15s;
    text-align: center; min-width: 110px;
  }
  button .sub {
    display: block; font-size: 11px; font-weight: 500; margin-top: 3px; letter-spacing: 0.5px;
  }
  button:hover { background: #e8f4fb; }
  button.selected { background: #1f8ed6; color: #ffffff; }
  svg { width: 100%; height: auto; max-width: 1300px; display: block; margin: 0 auto; }

  /* GPU package + die quadrants. Filled order: TL → TR → BR → BL (clockwise from upper-left). */
  .gpu-pkg     { fill: #ffffff; stroke: #555; stroke-width: 1; }
  .die-cell    { fill: #d9d9d9; stroke: none; }
  /* Blackwell Ultra (opt-C): 2 dies */
  body.opt-C .die-tl,
  body.opt-C .die-tr { fill: #1f1f1f; }
  /* Rubin (opt-A): 2 dies */
  body.opt-A .die-tl,
  body.opt-A .die-tr { fill: #1f1f1f; }
  /* Rubin Ultra (opt-B): 4 dies */
  body.opt-B .die-cell { fill: #1f1f1f; }
  /* Hopper (opt-E): 1 die — only TL quadrant filled */
  body.opt-E .die-tl { fill: #1f1f1f; }
  /* Rubin Ultra Compute (opt-J): all 4 die quadrants of every Rubin GPU filled */
  .rubin-bottom-die { fill: #d9d9d9; }
  body.opt-J .rubin-bottom-die { fill: #1f1f1f; }
</style>
</head>

    swThru:   "57.6 Tb NVLink",
    gpuLast:  ["G143", "G144"],
    swLast:   ["NVS7-143", "NVS7-144"],
    bottomSub:"24 Rubin Ultra NVSwitch Trays"
  },
  E: {
    title:    "Hopper DGX H100 Scale Up Network",
    platform: "DGX / HGX Platform",
    topSub:   "1x HGX H100 - 8 GPU packages - 8 GPU die",
    topSub2:  "4 NVSwitch packages / die",
    gen:      "NVLink 4",
    topLane:  "18x NVLink",
    topSerdes:"36x PAM4 100G SerDes",
    topThru:  "3.6 Tb - 900 GB/s",
    line2:    "2x PAM4 100G",
    line3:    "200Gb - 25GB/s",
    swTitle:  "NVSwitch 4",
    swLane:   "64x NVLink",
    swSerdes: "128x PAM4 100G SerDes",
    swThru:   "12.8 Tb NVLink",
    gpuLast:  ["G71", "G72"]
  },
  F: {
    title:    "Blackwell Compute Tray",
    platform: "Oberon Platform",
    topSub:   "1x Compute Tray - Internal Block Diagram"
  },
  G: {
    title:    "Vera Rubin Compute Tray",
    platform: "Oberon Platform",
    topSub:   "1x Compute Tray - Internal Block Diagram"
  },
  H: {
    title:    "Vera Rubin Compute Tray",
    platform: "Oberon Platform",
    topSub:   "1x Compute Tray"
  },
  I: {
    title:    "Hopper Server",
    platform: "DGX H100 Server",
    topSub:   ""
  },
  J: {
    title:    "Vera Rubin Ultra Compute Tray",
    platform: "Oberon Platform",
    topSub:   "1x Compute Tray"
  }
};
// IDs of every scale-up element that should hide when a compute view is shown.
const SCALE_UP_IDS = ['default-top', 'hopper-top', 'top-callout', 'option-A',
                      'option-B', 'option-C', 'option-E', 'phy-callout', 'switch-callout'];
// IDs of all compute views (toggled together).
const COMPUTE_VIEW_IDS = ['compute-blackwell', 'compute-rubin', 'compute-rubin2', 'compute-hopper'];

function setOption(opt) {
  const c = config[opt];
  // Title bar updates apply to every view.
  document.getElementById('main-title').textContent = c.title;
  document.getElementById('platform').textContent   = c.platform;
  document.getElementById('top-sub').textContent    = c.topSub;
  document.getElementById('top-sub2').textContent   = c.topSub2 || '';
  document.title = c.title;
  // Button selection state always updates.
  document.querySelectorAll('button[data-opt]').forEach(function (b) {
    b.classList.toggle('selected', b.dataset.opt === opt);
  });
  // ----- Compute views (Blackwell sled, Vera Rubin sled, Vera Rubin 2 sled, Hopper server, or Vera Rubin Ultra) -----
  // Option J reuses the compute-rubin2 SVG; body.opt-J flips the bottom die fills via CSS to render 4 dies per Rubin GPU.
  if (opt === 'F' || opt === 'G' || opt === 'H' || opt === 'I' || opt === 'J') {
    SCALE_UP_IDS.forEach(function (id) {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
    document.getElementById('compute-blackwell').style.display = (opt === 'F') ? '' : 'none';
    document.getElementById('compute-rubin').style.display     = (opt === 'G') ? '' : 'none';
    document.getElementById('compute-rubin2').style.display    = (opt === 'H' || opt === 'J') ? '' : 'none';
    document.getElementById('compute-hopper').style.display    = (opt === 'I') ? '' : 'none';
    document.body.className = 'opt-' + opt;
    // Update HBM (capacity / bandwidth) text per Rubin variant inside compute-rubin2.
    if (opt === 'H' || opt === 'J') {
      document.querySelectorAll('.hbm-line2').forEach(function (el) { el.textContent = (opt === 'J') ? '768GB' : '288GB'; });
      document.querySelectorAll('.hbm-line3').forEach(function (el) { el.textContent = (opt === 'J') ? '44TB/s est' : '22TB/s'; });
    }
    return;
  }
  // ----- Scale-up views (A, B, C, D, E) -----
  COMPUTE_VIEW_IDS.forEach(function (id) {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById('top-callout').style.display    = '';
  document.getElementById('phy-callout').style.display    = '';
  document.getElementById('switch-callout').style.display = '';
  // Compute callout: gen header + lane count + SerDes + throughput.
  document.getElementById('top-gen').textContent    = c.gen;
  document.getElementById('top-lane').textContent   = c.topLane;
  document.getElementById('top-serdes').textContent = c.topSerdes;
  document.getElementById('top-thru').textContent   = c.topThru;
  // Spec callout 3 lines (line1 is hardcoded "1x NVLink").
  document.getElementById('box-line2').textContent  = c.line2;
  document.getElementById('box-line3').textContent  = c.line3;
  // Switch callout.
  document.getElementById('sw-title').textContent   = c.swTitle;
  document.getElementById('sw-lane').textContent    = c.swLane;
  document.getElementById('sw-serdes').textContent  = c.swSerdes;
  document.getElementById('sw-thru').textContent    = c.swThru;
  // Trailing GPU labels (default 6-GPU layout).
  document.getElementById('gpu-71').textContent     = c.gpuLast[0];
  document.getElementById('gpu-72').textContent     = c.gpuLast[1];
  // Toggle top GPU layout: default 6-GPU bracket vs Hopper 8-GPU sled.
  document.getElementById('default-top').style.display = opt === 'E' ? 'none' : '';
  document.getElementById('hopper-top').style.display  = opt === 'E' ? '' : 'none';
  // Spec callout: keep the default 3-line single-NVLink spec visible for ALL options.
  // For Hopper, expand the box and append a descriptive sentence below the standard 3 lines.
  document.getElementById('phy-default-text').style.display = '';
  document.getElementById('hopper-phy-extra').style.display = opt === 'E' ? '' : 'none';
  document.getElementById('phy-rect').setAttribute('height', opt === 'E' ? 130 : 80);
  // Option D reuses Option B's bottom-half SVG layout (same switch hardware).
  document.getElementById('option-A').style.display = opt === 'A' ? '' : 'none';
  document.getElementById('option-B').style.display = (opt === 'B' || opt === 'D') ? '' : 'none';
  document.getElementById('option-C').style.display = opt === 'C' ? '' : 'none';
  document.getElementById('option-E').style.display = opt === 'E' ? '' : 'none';
  // For Option B / D, swap the trailing two NVSwitch labels and the bottom subtitle.
  if (opt === 'B' || opt === 'D') {
    document.getElementById('nvs-last1-B').textContent = c.swLast[0];
    document.getElementById('nvs-last2-B').textContent = c.swLast[1];
    document.getElementById('bottom-sub-B').textContent = c.bottomSub;
  }
  // Reposition the three leader endpoints. Hopper's first GPU sits at x=350 (vs default 410)
  // and its first switch at x=400, so the leader ovals/arrow need to follow.
  const isHopper   = opt === 'E';
  const topLeadX   = isHopper ? 350 : 410;
  const swLeadX    = isHopper ? 400 : 410;
  const phyArrowX  = isHopper ? 350 : 410;
  document.getElementById('top-leader-line').setAttribute('x2', topLeadX - 18);
  document.getElementById('top-leader-oval').setAttribute('cx', topLeadX);
  document.getElementById('switch-leader-line').setAttribute('x2', swLeadX - 18);
  document.getElementById('switch-leader-oval').setAttribute('cx', swLeadX);
  document.getElementById('phy-leader-line').setAttribute('x2', phyArrowX);
  // Body class controls die-fill via CSS; B/D both use NVLink-7 (4 dies). E uses its own markup.
  const dieClass = (opt === 'D') ? 'B' : opt;
  document.body.className = 'opt-' + dieClass;
}
</script>
